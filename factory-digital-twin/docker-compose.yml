services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]   # JetStream + monitoring
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring/health
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  simulator:
    build: .
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NATS_URL: nats://nats:4222
    command: ["python", "run.py", "--nats", "nats://nats:4222", "--realtime"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # one-shot: render the labeled YOLO defect dataset and upload images to MinIO
  # under keys that match each quality_event's image_ref. Exits when done.
  image-generator:
    build: .
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: ["python", "synthetic-images/defect_generator.py",
              "--minio", "minio:9000",
              "--out", "/data/dataset"]
    restart: "no"
