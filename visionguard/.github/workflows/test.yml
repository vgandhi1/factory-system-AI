name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: inference-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Unit tests cover the pure guardrail logic (review.py — the 0.70 human-
      # review gate) and need no ML stack. The full inference deps (torch,
      # ultralytics, opencv) are heavy; a deps-installing integration job is
      # deferred — see SPEC.md.
      - name: Install (test deps only)
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
      - name: Lint (critical errors; rule set tightens over time)
        run: ruff check --select E9,F63,F7,F82 .
      - name: Test
        run: pytest -q
